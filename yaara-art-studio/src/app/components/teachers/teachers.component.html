<section id="teachers" class="teachers">
  <div class="container">
    <div class="teachers-header">
      <h2 class="section-title">המורות של הסטודיו</h2>
    </div>

    <div class="design-editorial">
      <article
        class="editorial-row"
        *ngFor="let teacher of teachers; let i = index; trackBy: trackById"
        [class.reverse]="i % 2 === 1"
      >
        <div class="editorial-portrait">
          <div class="portrait-frame">
            <img [src]="teacher.imageUrl" [alt]="teacher.name" loading="lazy" />
          </div>
        </div>
        <div class="editorial-copy">
          <p class="teacher-role" *ngIf="teacher.role">{{ teacher.role }}</p>
          <h3 class="teacher-name editorial-name">{{ teacher.name }}</h3>
          <div
            class="bio-clip"
            #bioClip
            [class.expanded]="isExpanded(teacher.id)"
            [attr.aria-expanded]="isExpanded(teacher.id)"
            [id]="'bio-' + teacher.id"
          >
            <p class="teacher-bio">{{ teacher.bio }}</p>
          </div>
          <button
            type="button"
            class="read-more-btn"
            (click)="toggleExpand(teacher.id, bioClip)"
            [attr.aria-controls]="'bio-' + teacher.id"
          >
            <span>{{ isExpanded(teacher.id) ? 'הסתירו' : 'קראו עוד' }}</span>
            <svg
              class="chevron"
              [class.open]="isExpanded(teacher.id)"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              aria-hidden="true"
            >
              <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>
      </article>
    </div>
  </div>
</section>
