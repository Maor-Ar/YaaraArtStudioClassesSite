<section id="testimonials" class="testimonials">
  <div class="container">
    <div class="testimonials-header">
      <h2 class="section-title">מה אומרים עלינו</h2>
      <p class="testimonials-kicker">הודעות אמיתיות מתלמידים בוואטסאפ</p>
    </div>

    <div class="design-spotlight">
      <div class="spotlight-main" [class.is-leaving]="spotlightLeaving">
        <button type="button" class="spot-arrow spot-prev" (click)="prevSpotlight()" aria-label="הקודם">
          ‹
        </button>

        <figure class="spotlight-figure" [class.portrait]="isPortrait(activeTestimonial)">
          <button type="button" class="shot-btn" (click)="openLightbox(activeTestimonial.src)">
            <img [src]="activeTestimonial.src" [alt]="activeTestimonial.alt" />
          </button>
        </figure>

        <button type="button" class="spot-arrow spot-next" (click)="nextSpotlight(true)" aria-label="הבא">
          ›
        </button>
      </div>

      <div class="spotlight-thumbs" role="tablist" aria-label="בחירת המלצה">
        <button
          type="button"
          class="thumb"
          *ngFor="let item of testimonials; let i = index; trackBy: trackById"
          [class.active]="activeIndex === i"
          (click)="selectSpotlight(i, true)"
          [attr.aria-selected]="activeIndex === i"
          role="tab"
        >
          <img [src]="item.src" [alt]="item.alt" loading="lazy" />
        </button>
      </div>
    </div>
  </div>

  <div
    class="lightbox"
    *ngIf="lightboxSrc"
    (click)="closeLightbox()"
    role="dialog"
    aria-modal="true"
    aria-label="תצוגה מוגדלת של ההמלצה"
  >
    <button type="button" class="lightbox-close" (click)="closeLightbox()" aria-label="סגירה">×</button>
    <img [src]="lightboxSrc" alt="המלצה מוואטסאפ" (click)="$event.stopPropagation()" />
  </div>
</section>
